<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Content-Security-Policy (H-5): script-src no longer allows 'unsafe-inline' — all inline
         script blocks moved to external files (potsFontScale.js / potsPageInit.js).
         An anti-framing directive (none) is added below for clickjacking defence (the meta-CSP
         form is spec-ignored, so belt-and-suspenders pending a real header). style-src keeps
         'unsafe-inline' (inline style=). -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com; frame-src https://js.stripe.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'">
    <title>Pots & Investments - Money Tracker</title>
    <link rel="stylesheet" href="../../lib/auth_db/shared/vendor/font-awesome/css/all.min.css">
    <link rel="stylesheet" href="../../lib/auth_db/shared/styles/main-compiled.css">
    <script src="../../lib/auth_db/shared/vendor/supabase/supabase.min.js"></script>
    <!-- H-5: early font-scale bootstrap (was an inline script) — no defer so it runs before paint -->
    <script src="potsFontScale.js"></script>
</head>
<body>
    <!-- Header will be injected by Header.js -->

    <main class="page-container" role="main">
        <div class="hero-section">
            <h1 class="hero-title">Pots & Investments</h1>
        </div>

        <div class="pots-layout">
            <!-- Summary Cards -->
            <section class="pots-summary-section">
                <div class="pots-summary-grid">
                    <div class="pot-summary-card">
                        <div class="pot-summary-icon">
                            <i class="fas fa-piggy-bank"></i>
                        </div>
                        <div class="pot-summary-content">
                            <span class="pot-summary-label">Estimated Total</span>
                            <span class="pot-summary-value" id="total-pots-estimated">0.00</span>
                        </div>
                    </div>
                    <div class="pot-summary-card pot-summary-actual">
                        <div class="pot-summary-icon">
                            <i class="fas fa-coins"></i>
                        </div>
                        <div class="pot-summary-content">
                            <span class="pot-summary-label">Actual Total</span>
                            <span class="pot-summary-value" id="total-pots-actual">0.00</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- All Pots Section -->
            <section class="form-section">
                <div class="section-header">
                    <h2 class="section-title"><i class="fas fa-list"></i> All Pots</h2>
                    <button id="add-pot-button" class="btn btn-action btn-sm">
                        <i class="fas fa-plus"></i> Add Pot
                    </button>
                </div>
                <table class="data-table" id="pots-table">
                    <thead>
                        <tr>
                            <th>Category</th>
                            <th>Estimated</th>
                            <th>Actual</th>
                            <th class="delete-column-header"></th>
                        </tr>
                    </thead>
                    <tbody id="pots-tbody"></tbody>
                </table>
            </section>

            <!-- Pots by Month Section -->
            <section class="form-section">
                <div class="section-header">
                    <h2 class="section-title"><i class="fas fa-calendar-alt"></i> Monthly View</h2>
                    <select id="month-selector-pots" class="form-select month-filter-select">
                        <option value="">Select month...</option>
                    </select>
                </div>
                <div id="pots-by-month-container" class="pots-month-view">
                    <p class="empty-message">Select a month to view pot allocations.</p>
                </div>
            </section>
        </div>
    </main>

    <!-- Database Layer -->
    <!-- Global Logging Configuration - MUST load first -->
    <script src="../../lib/auth_db/shared/config/loggingConfig.js"></script>

    <script src="../../lib/auth_db/database/config/supabaseConfig.js"></script>
    <script src="../../lib/auth_db/shared/services/authService.js"></script>
    
    <!-- Database Module Configuration -->
    <script src="../../lib/auth_db/database/config/databaseConfigBase.js"></script>
    <script src="../../lib/auth_db/database/config/moneyTrackerDatabaseConfig.js"></script>
    <script src="../../lib/auth_db/database/utils/databaseConfigHelper.js"></script>
    <script src="../../lib/auth_db/database/databaseModule.js"></script>

    <!-- Core Utilities -->
    <script src="../../lib/auth_db/shared/config/moduleRegistry.js"></script>
    <script src="../../lib/auth_db/shared/config/constants.js"></script>
    <script src="../../lib/auth_db/shared/utils/logger.js"></script>
    <script src="../../lib/auth_db/shared/utils/errorHandler.js"></script>
    <script src="../../lib/auth_db/shared/utils/validators.js"></script>
    
    <!-- Budget E2E encryption (S4/S5): primitives + budget DEK/crypto services.
         Loaded BEFORE databaseService.js so its transformPotTo/FromDatabase
         transforms can resolve window.BudgetCryptoService / window.BudgetKeyService
         (encrypt-on-write + dual-read; BUDGET_E2E_DESIGN.md §3).
         The encryption config is loaded first so the page can run
         KeyStorageService.initialize(MoneyTrackerEncryptionConfig) at startup —
         without it ensureBudgetDEK -> getIdentityKeys throws "Service not
         initialized" (C2). -->
    <script src="../../lib/auth_db/encryption/config/encryptionConfigBase.js"></script>
    <script src="../../lib/auth_db/encryption/config/moneyTrackerEncryptionConfig.js"></script>
    <script src="../../lib/auth_db/encryption/utils/encryptionConfigHelper.js"></script>
    <script src="../../lib/auth_db/encryption/services/cryptoLibraryLoader.js"></script>
    <script src="../../lib/auth_db/encryption/services/keyDerivationService.js"></script>
    <script src="../../lib/auth_db/encryption/services/cryptoPrimitivesService.js"></script>
    <script src="../../lib/auth_db/encryption/services/keyStorageService.js"></script>
    <script src="../../lib/auth_db/encryption/utils/encryptionErrors.js"></script>
    <script src="../../shared/services/budgetCryptoService.js"></script>
    <script src="../../shared/services/budgetKeyService.js"></script>

    <!-- Database Service -->
    <script src="../../lib/auth_db/database/services/databaseService.js"></script>
    <script src="../../database/services/dataSharingService.js"></script>
    <script src="../../database/services/fieldLockingService.js"></script>

    <!-- Notification Services -->
    <script src="../../lib/auth_db/database/services/notificationTypeRegistry.js"></script>
    <script src="../../lib/auth_db/database/services/notificationService.js"></script>
    <script src="../../lib/auth_db/database/services/notificationPreferenceService.js"></script>
    <script src="../../lib/auth_db/database/services/notificationChannelService.js"></script>
    <script src="../../lib/auth_db/database/services/notificationProcessor.js"></script>

    <!-- Initialize Database Module -->
    <script src="../../lib/auth_db/database/initDatabase.js"></script>

    <!-- Messaging Service -->
    <script src="../../lib/messaging/messaging/services/messagingService.js"></script>
    
    <!-- Payments Module Configuration -->
    <script src="../../lib/payments_app/payments/config/paymentsConfigBase.js"></script>
    <script src="../../lib/payments_app/payments/config/moneyTrackerConfig.js"></script>
    <script src="../../lib/payments_app/payments/utils/configHelper.js"></script>
    <script src="../../lib/payments_app/payments/paymentsModule.js"></script>
    
    <!-- Payments Services -->
    <script src="../../lib/payments_app/payments/services/stripeService.js"></script>
    <script src="../../lib/payments_app/payments/services/paymentService.js"></script>
    <script src="../../lib/payments_app/payments/services/subscriptionService.js"></script>
    <script src="../../lib/payments_app/payments/utils/subscriptionChecker.js"></script>
    
    <!-- Initialize Payments Module -->
    <script src="../../lib/payments_app/payments/initPayments.js"></script>
    <script src="../../lib/payments_app/payments/utils/waitForPaymentsInit.js"></script>
    <script src="../../lib/payments_app/shared/utils/subscriptionGuard.js"></script>
    <script src="../../lib/payments_app/shared/utils/permissionService.js"></script>
    <script src="../../lib/auth_db/shared/utils/authGuard.js"></script>
    <script src="../../lib/auth_db/shared/utils/networkUtils.js"></script>
    <script src="../../lib/auth_db/shared/utils/offlineHandler.js"></script>
    <script src="../../database/models/dataManager.js"></script>
    <script src="../../database/models/monthFactory.js"></script>
    
    <!-- UI Layer -->
    <script src="../../shared/services/calculationService.js"></script>
    <script src="../../shared/services/formHandler.js"></script>
    <script src="../../shared/services/tableRenderer.js"></script>
    <script src="../../shared/utils/formatters.js"></script>
    <script src="../../shared/services/exportService.js"></script>
    <script src="../../shared/header/header.js"></script>
    <script src="../controllers/potsController.js"></script>
    <!-- H-5: page init (was an inline script) moved to an external, deferred file.
         Kept AFTER potsController.js to preserve original script order. -->
    <script defer src="potsPageInit.js"></script>
</body>
</html>
